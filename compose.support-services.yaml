services:
  postgres:
    image: postgres:16-alpine
    container_name: iron-council-postgres
    environment:
      POSTGRES_DB: iron_council
      POSTGRES_USER: iron_council
      POSTGRES_PASSWORD: iron_council
    ports:
      - "54321:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
